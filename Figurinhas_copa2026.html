<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Figurinhas Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0e0a1a;
  --bg2:#160e2a;
  --card-radius:22px;
  --font-title:'Fredoka One',cursive;
  --font-body:'Nunito',sans-serif;
}

html{scroll-behavior:smooth}

body{
  font-family:var(--font-body);
  background:var(--bg);
  min-height:100vh;
  overflow-x:hidden;
  color:#fff;
}

/* ── FUNDO ANIMADO ── */
.bg-orbs{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.orb{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;
  animation:orbFloat 12s ease-in-out infinite;
}
.orb1{width:500px;height:500px;background:#ff6b35;top:-100px;left:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:#00d4ff;top:20%;right:-80px;animation-delay:-4s}
.orb3{width:350px;height:350px;background:#ffdd00;bottom:10%;left:20%;animation-delay:-8s}
.orb4{width:300px;height:300px;background:#ff3cac;bottom:-80px;right:10%;animation-delay:-2s}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-40px) scale(1.1)}
  66%{transform:translate(-20px,20px) scale(0.95)}
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(14,10,26,0.85);
  backdrop-filter:blur(20px);
  border-bottom:2px solid rgba(255,255,255,0.08);
  padding:12px 20px;
}

.hdr-inner{
  max-width:1200px;margin:auto;
  display:flex;flex-direction:column;gap:12px;
}

.hdr-top{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}

.logo{
  display:flex;align-items:center;gap:14px;
}
.logo-icon{
  font-size:48px;
  animation:spin 6s linear infinite;
  filter:drop-shadow(0 0 16px rgba(255,221,0,0.7));
}
@keyframes spin{
  0%,90%{transform:rotate(0deg)}
  95%{transform:rotate(20deg)}
  100%{transform:rotate(0deg)}
}
.logo-text h1{
  font-family:var(--font-title);
  font-size:26px;letter-spacing:1px;line-height:1;
  background:linear-gradient(90deg,#ffdd00,#ff6b35,#ff3cac,#00d4ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:300%;
  animation:gradShift 4s linear infinite;
}
@keyframes gradShift{0%{background-position:0%}100%{background-position:300%}}
.logo-text p{
  font-size:11px;color:rgba(255,255,255,0.45);font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-top:2px;
}

/* Stats topo */
.hdr-stats{
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}
.hstat{
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:6px 14px;
  display:flex;flex-direction:column;align-items:center;
  min-width:72px;
}
.hstat-val{
  font-family:var(--font-title);font-size:22px;line-height:1;
}
.hstat-lbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:2px;}
.hstat:nth-child(1) .hstat-val{color:#4eff91}
.hstat:nth-child(2) .hstat-val{color:#ff6b6b}
.hstat:nth-child(3) .hstat-val{color:#ffdd00}
.hstat:nth-child(4) .hstat-val{color:#00d4ff}

/* Barra de progresso global */
.prog-global{
  background:rgba(255,255,255,0.07);
  border-radius:99px;height:8px;overflow:hidden;position:relative;
}
.prog-global-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#4eff91,#00d4ff,#ffdd00,#ff6b35);
  background-size:300%;
  animation:gradShift 3s linear infinite;
  transition:width .6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 16px rgba(78,255,145,0.5);
}

/* ── BARRA DE FERRAMENTAS ── */
.toolbar{
  max-width:1200px;margin:14px auto 0;
  padding:0 20px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}

.search-wrap{
  position:relative;flex:1;min-width:200px;
}
.search-wrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,0.35);width:16px;height:16px;pointer-events:none;
}
#busca{
  width:100%;padding:10px 14px 10px 42px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:14px;color:#fff;
  font-family:var(--font-body);font-size:14px;font-weight:600;
  transition:border-color .2s,box-shadow .2s;
}
#busca:focus{outline:none;border-color:#ffdd00;box-shadow:0 0 0 3px rgba(255,221,0,.15)}
#busca::placeholder{color:rgba(255,255,255,.3)}

#filtro{
  padding:10px 14px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:14px;color:#fff;
  font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;
}
#filtro:focus{outline:none;border-color:#ffdd00}
#filtro option{background:#160e2a}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:14px;border:none;
  font-family:var(--font-body);font-size:13px;font-weight:800;
  cursor:pointer;white-space:nowrap;
  transition:transform .15s,filter .15s,box-shadow .15s;
}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.btn:active{transform:scale(.97)}

.btn-festa{background:linear-gradient(135deg,#ff6b35,#ff3cac);color:#fff;box-shadow:0 4px 20px rgba(255,107,53,.35)}
.btn-azul{background:linear-gradient(135deg,#0070f3,#00d4ff);color:#fff;box-shadow:0 4px 20px rgba(0,212,255,.25)}
.btn-ghost{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.14);color:rgba(255,255,255,.8)}
.btn-perigo{background:rgba(255,60,60,0.15);border:1.5px solid rgba(255,60,60,.3);color:#ff9999}

/* ── MAIN ── */
main{
  max-width:1200px;margin:auto;
  padding:20px 20px 100px;
  position:relative;z-index:1;
}

/* ── PAINEL LISTA ── */
.painel-lista{
  background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(255,255,255,0.1);
  border-radius:var(--card-radius);
  padding:20px;margin-bottom:24px;
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

.painel-lista h3{
  font-family:var(--font-title);font-size:18px;
  color:#ffdd00;margin-bottom:14px;letter-spacing:.5px;
}
.acoes-painel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}

.checkgrid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:6px;max-height:260px;overflow-y:auto;padding:4px;
}
.checkgrid::-webkit-scrollbar{width:5px}
.checkgrid::-webkit-scrollbar-track{background:transparent}
.checkgrid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px}

.checkitem{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:8px 10px;font-size:13px;font-weight:700;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.checkitem:hover{background:rgba(255,221,0,.08);border-color:rgba(255,221,0,.3)}
.checkitem input[type="checkbox"]{width:15px;height:15px;accent-color:#ffdd00;flex-shrink:0;cursor:pointer}
.checkitem .ci-flag{font-size:18px;flex-shrink:0}
.checkitem .ci-nome{flex:1;color:rgba(255,255,255,.85)}
.checkitem .ci-badge{
  font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;
  background:rgba(255,80,80,.15);color:#ff8888;border:1px solid rgba(255,80,80,.25);
}
.checkitem .ci-badge.ok{background:rgba(78,255,145,.1);color:#4eff91;border-color:rgba(78,255,145,.2)}

.box-lista{
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:16px;margin-top:14px;
}
.box-lista h4{font-family:var(--font-title);font-size:15px;color:#ffdd00;margin-bottom:10px}
.box-lista textarea{
  width:100%;min-height:180px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:12px;
  color:#4eff91;font-family:monospace;font-size:12px;resize:vertical;
}

/* ── SEÇÃO HEADING ── */
.secao-heading{
  display:flex;align-items:center;gap:14px;
  margin:32px 0 16px;
}
.secao-heading-text{
  font-family:var(--font-title);
  font-size:13px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.4);white-space:nowrap;
}
.secao-linha{flex:1;height:1px;background:rgba(255,255,255,.08)}

/* ── GRADE DE PAÍSES ── */
.paises-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
}

/* ── CARD DE PAÍS ── */
.pais-card{
  border-radius:var(--card-radius);
  overflow:hidden;
  position:relative;
  border:2px solid transparent;
  background:linear-gradient(var(--bg2),var(--bg2)) padding-box,
             var(--grad) border-box;
  transition:transform .2s,box-shadow .2s;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
.pais-card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05);
}

/* header do card */
.pais-header{
  padding:16px 18px 14px;
  display:flex;align-items:center;gap:14px;
  position:relative;
  background:var(--grad-header);
}
.pais-flag{
  font-size:44px;line-height:1;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));
  flex-shrink:0;
}
.pais-info{flex:1;min-width:0}
.pais-nome{
  font-family:var(--font-title);font-size:19px;letter-spacing:.3px;
  color:#fff;line-height:1.1;
  text-shadow:0 2px 8px rgba(0,0,0,.4);
}
.pais-codigo{
  display:inline-block;
  font-size:11px;font-weight:800;letter-spacing:2px;
  color:rgba(255,255,255,.6);
  background:rgba(0,0,0,.25);
  padding:2px 8px;border-radius:99px;margin-top:4px;
}
.pais-contagem{
  font-family:var(--font-title);
  font-size:13px;
  text-align:right;
  line-height:1.3;
  flex-shrink:0;
}
.pais-contagem .ct-tenho{color:#4eff91}
.pais-contagem .ct-falta{color:#ff8888}
.pais-contagem .ct-completo{color:#ffdd00;font-size:14px}

/* barra de progresso do card */
.pais-progbar{
  height:5px;
  background:rgba(0,0,0,.3);
}
.pais-progbar-fill{
  height:100%;
  transition:width .5s cubic-bezier(.4,0,.2,1);
}

/* body do card — figurinhas */
.pais-body{
  padding:14px 16px 16px;
}

/* grid de figurinhas */
.figs-wrap{
  display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;
}

.fig{
  padding:6px 5px;min-width:46px;
  border-radius:10px;border:2px solid;
  font-family:var(--font-title);font-size:12px;
  cursor:pointer;text-align:center;line-height:1;
  transition:transform .12s,box-shadow .12s,filter .12s;
  position:relative;
}
.fig:hover{transform:scale(1.15) rotate(-2deg);z-index:5;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.fig:active{transform:scale(.95)}

.fig.tenho{
  background:rgba(78,255,145,.12);
  color:#4eff91;
  border-color:rgba(78,255,145,.35);
}
.fig.tenho:hover{background:rgba(78,255,145,.22);border-color:#4eff91}

.fig.falta{
  background:rgba(255,107,107,.1);
  color:#ff8888;
  border-color:rgba(255,107,107,.25);
}
.fig.falta:hover{background:rgba(255,107,107,.22);border-color:#ff8888}

/* badge "completo" sobre o card */
.badge-completo{
  position:absolute;top:14px;right:14px;
  background:linear-gradient(135deg,#ffdd00,#ff6b35);
  color:#1a0a00;font-family:var(--font-title);font-size:12px;
  padding:4px 10px;border-radius:99px;
  box-shadow:0 4px 12px rgba(255,221,0,.4);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
  z-index:10;
}

/* botões de ação do card */
.pais-acoes{
  display:flex;gap:6px;
}
.btn-card{
  flex:1;padding:7px 10px;border-radius:10px;border:none;
  font-family:var(--font-body);font-size:12px;font-weight:800;
  cursor:pointer;
  transition:transform .12s,filter .12s;
}
.btn-card:hover{transform:translateY(-1px);filter:brightness(1.15)}
.btn-card.marcar-tenho{background:rgba(78,255,145,.12);color:#4eff91;border:1.5px solid rgba(78,255,145,.25)}
.btn-card.marcar-falta{background:rgba(255,107,107,.1);color:#ff8888;border:1.5px solid rgba(255,107,107,.2)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(22,14,42,.95);
  border:2px solid;
  color:#fff;font-family:var(--font-body);font-size:14px;font-weight:800;
  padding:12px 24px;border-radius:16px;z-index:9999;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.toast-ok{border-color:#4eff91;box-shadow:0 8px 32px rgba(78,255,145,.2)}
.toast.toast-err{border-color:#ff8888;box-shadow:0 8px 32px rgba(255,107,107,.2)}

/* celebração confete */
.confete{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:9998;overflow:hidden;
}
.c-piece{
  position:absolute;top:-10px;
  width:8px;height:8px;border-radius:2px;
  animation:cair 1.2s ease-in forwards;
}
@keyframes cair{
  0%{opacity:1;transform:translateY(0) rotate(0)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

.sem-resultado{
  text-align:center;padding:80px 20px;
  font-family:var(--font-title);font-size:22px;
  color:rgba(255,255,255,.3);
}

/* RESPONSIVE */
@media(max-width:640px){
  .paises-grid{grid-template-columns:1fr}
  .logo-icon{font-size:36px}
  .logo-text h1{font-size:20px}
  .hdr-stats{gap:5px}
  .hstat{min-width:60px;padding:5px 10px}
  .hstat-val{font-size:18px}
  .pais-flag{font-size:34px}
}
@media(max-width:400px){
  .btn{padding:8px 11px;font-size:12px}
}
</style>
</head>
<body>

<!-- ORBS DE FUNDO -->
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<!-- CONFETES (injetados por JS) -->
<div class="confete" id="confete"></div>

<!-- HEADER -->
<header>
  <div class="hdr-inner">
    <div class="hdr-top">
      <div class="logo">
        <div class="logo-icon">⚽</div>
        <div class="logo-text">
          <h1>FIGURINHAS COPA 2026</h1>
          <p>Controle pessoal · família · offline</p>
        </div>
      </div>
      <div class="hdr-stats">
        <div class="hstat"><span class="hstat-val" id="tenhoTotal">0</span><span class="hstat-lbl">Tenho</span></div>
        <div class="hstat"><span class="hstat-val" id="faltaTotal">0</span><span class="hstat-lbl">Faltam</span></div>
        <div class="hstat"><span class="hstat-val" id="totalGeral">0</span><span class="hstat-lbl">Total</span></div>
        <div class="hstat"><span class="hstat-val" id="percentual">0%</span><span class="hstat-lbl">Progresso</span></div>
      </div>
    </div>
    <div class="prog-global">
      <div class="prog-global-fill" id="progBar" style="width:0%"></div>
    </div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="busca" type="search" placeholder="Buscar seleção ou figurinha…">
  </div>
  <select id="filtro">
    <option value="todas">🌍 Todas</option>
    <option value="faltando">❌ Com faltantes</option>
    <option value="completas">✅ Completas</option>
  </select>
  <button class="btn btn-festa" onclick="abrirPainelLista()">📋 Lista filtrada</button>
  <button class="btn btn-azul"  onclick="gerarLista()">📄 Lista geral</button>
  <button class="btn btn-ghost" onclick="exportar()">💾 Exportar</button>
  <button class="btn btn-ghost" onclick="importar()">📥 Importar</button>
  <button class="btn btn-ghost" onclick="baixarCopia()">⬇️ Baixar cópia</button>
  <button class="btn btn-perigo" onclick="resetar()">↺ Restaurar</button>
</div>

<!-- MAIN -->
<main>
  <!-- PAINEL LISTA -->
  <div id="painelLista" class="painel-lista" style="display:none">
    <h3>🎯 GERAR LISTA DE FALTANTES POR SELEÇÃO</h3>
    <div class="acoes-painel">
      <button class="btn btn-ghost" onclick="marcarTodosLista(true)">✔ Selecionar todas</button>
      <button class="btn btn-ghost" onclick="marcarTodosLista(false)">✕ Limpar</button>
      <button class="btn btn-festa" onclick="selecionarSoComFaltantes()">🎯 Só com faltantes</button>
      <button class="btn btn-azul"  onclick="gerarListaSelecionada()">📝 Gerar lista</button>
    </div>
    <div id="opcoesLista" class="checkgrid"></div>
    <div id="caixaLista" class="box-lista" style="display:none">
      <h4>📋 LISTA GERADA — copie e compartilhe!</h4>
      <textarea id="listaTexto" readonly></textarea>
    </div>
  </div>

  <div id="app"></div>
</main>

<div class="toast" id="toast"></div>

<script>

function faltantes(g){return g.itens.filter(i=>!tenho(i))}

function alternar(item){
  estado[item]=!estado[item];
  salvar();
  if(tenho(item)) disparaConfete();
  desenhar();
  mostrarToast(tenho(item)?`✅ ${item} — TENHO!`:`❌ ${item} — falta`, tenho(item)?'ok':'err');
}

function marcarGrupo(idx,valor){
  const era = obtidos(ALBUM[idx]).length;
  ALBUM[idx].itens.forEach(i=>estado[i]=valor);
  salvar(); desenhar(); montarOpcoesLista();
  if(valor && era<ALBUM[idx].itens.length) disparaConfete(30);
  mostrarToast(valor?`🎉 Todas de ${ALBUM[idx].nome} marcadas!`:`❌ ${ALBUM[idx].nome} desmarcado`,'ok');
}

function resetar(){
  if(confirm("Restaurar para a lista inicial embutida?\n\nIsso apagará o progresso atual.")){
    estado=estadoInicial();salvar();desenhar();montarOpcoesLista();
    mostrarToast("↺ Progresso restaurado",'ok');
  }
}

/* ══ CONFETE ══ */
const CORES_CONF=['#ff6b35','#ffdd00','#4eff91','#00d4ff','#ff3cac','#fff'];
function disparaConfete(n=15){
  const c=document.getElementById('confete');
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='c-piece';
    d.style.left=Math.random()*100+'vw';
    d.style.background=CORES_CONF[Math.floor(Math.random()*CORES_CONF.length)];
    d.style.width=(6+Math.random()*6)+'px';
    d.style.height=(6+Math.random()*6)+'px';
    d.style.animationDuration=(0.8+Math.random()*0.8)+'s';
    d.style.animationDelay=(Math.random()*0.4)+'s';
    c.appendChild(d);
    d.addEventListener('animationend',()=>d.remove());
  }
}

/* ══ RENDER ══ */
function desenhar(){
  const app=document.getElementById('app');
  const busca=document.getElementById('busca').value.toLowerCase().trim();
  const filtro=document.getElementById('filtro').value;
  let html='', total=0, tenhoT=0, secaoAtual='';

  ALBUM.forEach(g=>{total+=g.itens.length;tenhoT+=obtidos(g).length;});
  const faltaT=total-tenhoT;
  const pct=total?Math.round((tenhoT/total)*100):0;

  document.getElementById('tenhoTotal').textContent=tenhoT;
  document.getElementById('faltaTotal').textContent=faltaT;
  document.getElementById('totalGeral').textContent=total;
  document.getElementById('percentual').textContent=pct+'%';
  document.getElementById('progBar').style.width=pct+'%';

  let gruposVisiveis=[];
  ALBUM.forEach((g,idx)=>{
    const t=obtidos(g), f=faltantes(g);
    const texto=(g.secao+' '+g.nome+' '+g.codigo+' '+g.itens.join(' ')).toLowerCase();
    if(busca && !texto.includes(busca)) return;
    if(filtro==='faltando' && f.length===0) return;
    if(filtro==='completas' && f.length>0) return;
    gruposVisiveis.push({g,idx,t,f});
  });

  if(!gruposVisiveis.length){
    app.innerHTML='<div class="sem-resultado">🔍 Nenhum resultado encontrado.</div>';
    return;
  }

  gruposVisiveis.forEach(({g,idx,t,f},vi)=>{
    if(g.secao!==secaoAtual){
      secaoAtual=g.secao;
      html+=`<div class="secao-heading">
        <div class="secao-linha"></div>
        <div class="secao-heading-text">${secaoAtual}</div>
        <div class="secao-linha"></div>
      </div><div class="paises-grid" id="grid_${secaoAtual.replace(/\s/g,'_')}">`;
    }

    const pctG=g.itens.length?Math.round((t.length/g.itens.length)*100):0;
    const completo=f.length===0;

    const figsHtml=g.itens.map(item=>`<button
      class="fig ${tenho(item)?'tenho':'falta'}"
      onclick="alternar('${item}')"
      title="${tenho(item)?'Tenho':'Falta'}: ${item}"
    >${item.replace(g.codigo,'')}</button>`).join('');

    const contagem=completo
      ? `<div class="ct-completo">🏅 100%</div>`
      : `<div class="ct-tenho">✅ ${t.length}</div><div class="ct-falta">❌ ${f.length}</div>`;

    // cor da barra de progresso baseada no gradiente do card
    const barGrad=completo?'linear-gradient(90deg,#4eff91,#ffdd00)':g.grad;

    html+=`
<div class="pais-card" style="--grad:${g.grad};--grad-header:${g.grad.replace('linear-gradient','linear-gradient').replace(')',',0.18)')}">
  ${completo?'<div class="badge-completo">🏅 COMPLETO</div>':''}
  <div class="pais-header">
    <div class="pais-flag">${g.bandeira}</div>
    <div class="pais-info">
      <div class="pais-nome">${g.nome}</div>
      <div class="pais-codigo">${g.codigo}</div>
    </div>
    <div class="pais-contagem">${contagem}</div>
  </div>
  <div class="pais-progbar">
    <div class="pais-progbar-fill" style="width:${pctG}%;background:${barGrad}"></div>
  </div>
  <div class="pais-body">
    <div class="figs-wrap">${figsHtml}</div>
    <div class="pais-acoes">
      <button class="btn-card marcar-tenho" onclick="marcarGrupo(${idx},true)">✅ Marcar tudo</button>
      <button class="btn-card marcar-falta" onclick="marcarGrupo(${idx},false)">❌ Desmarcar tudo</button>
    </div>
  </div>
</div>`;

    // fecha a grid se for o último item da seção ou o último item geral
    const proxIdx=vi+1;
    const proxG=gruposVisiveis[proxIdx];
    if(!proxG || proxG.g.secao!==g.secao) html+='</div>';
  });

  app.innerHTML=html;

  // animação escalonada nos cards
  document.querySelectorAll('.pais-card').forEach((c,i)=>{
    c.style.animationDelay=(i*0.03)+'s';
  });
}

/* ══ PAINEL LISTA ══ */
function abrirPainelLista(){
  const p=document.getElementById('painelLista');
  const v=p.style.display!=='none';
  p.style.display=v?'none':'block';
  if(!v){montarOpcoesLista();p.scrollIntoView({behavior:'smooth',block:'start'});}
}

function montarOpcoesLista(){
  const div=document.getElementById('opcoesLista');
  div.innerHTML=ALBUM.map((g,idx)=>{
    const f=faltantes(g);
    const ok=f.length===0;
    return `<label class="checkitem">
      <input type="checkbox" class="chkLista" value="${idx}">
      <span class="ci-flag">${g.bandeira}</span>
      <span class="ci-nome">${g.nome}</span>
      <span class="ci-badge ${ok?'ok':''}">${ok?'✓ completo':f.length+' faltam'}</span>
    </label>`;
  }).join('');
}

function marcarTodosLista(v){document.querySelectorAll('.chkLista').forEach(c=>c.checked=v)}
function selecionarSoComFaltantes(){document.querySelectorAll('.chkLista').forEach(c=>c.checked=faltantes(ALBUM[Number(c.value)]).length>0)}

function gerarListaSelecionada(){
  const marcados=[...document.querySelectorAll('.chkLista:checked')].map(c=>Number(c.value));
  if(!marcados.length){mostrarToast('⚠️ Selecione pelo menos uma seleção','err');return;}
  let saida=[],secao='';
  marcados.forEach(idx=>{
    const g=ALBUM[idx],f=faltantes(g);
    if(!f.length) return;
    if(g.secao!==secao){secao=g.secao;saida.push('\n# '+secao);}
    saida.push(`${g.bandeira} ${g.nome} (${g.codigo}): ${f.join(', ')}`);
  });
  mostrarTexto(saida.join('\n').trim()||'✅ As seleções escolhidas estão completas!');
}

function gerarLista(){
  let saida=[],secao='';
  ALBUM.forEach(g=>{
    const f=faltantes(g);
    if(!f.length) return;
    if(g.secao!==secao){secao=g.secao;saida.push('\n# '+secao);}
    saida.push(`${g.bandeira} ${g.nome} (${g.codigo}): ${f.join(', ')}`);
  });
  const painel=document.getElementById('painelLista');
  painel.style.display='block';
  mostrarTexto(saida.join('\n').trim()||'✅ Álbum completo! Parabéns!');
  painel.scrollIntoView({behavior:'smooth'});
}

function exportar(){
  const tenhoAtual=Object.keys(estado).filter(k=>estado[k]).sort();
  mostrarTexto(tenhoAtual.join(','));
  const painel=document.getElementById('painelLista');
  painel.style.display='block';
  painel.scrollIntoView({behavior:'smooth'});
  mostrarToast('💾 Copie e envie para a família!','ok');
}

function importar(){
  const txt=prompt('Cole aqui o progresso exportado (figurinhas separadas por vírgula):');
  if(!txt) return;
  const lista=txt.split(',').map(x=>x.trim()).filter(Boolean);
  ALBUM.forEach(g=>g.itens.forEach(item=>estado[item]=lista.includes(item)));
  salvar();desenhar();montarOpcoesLista();
  mostrarToast('📥 Progresso importado!','ok');
}

function baixarCopia(){
  const atual=Object.keys(estado).filter(k=>estado[k]).sort();
  let html=document.documentElement.outerHTML;
  html=html.replace(/const EMBUTIDO_TENHO = \[[\s\S]*?\];/,
    'const EMBUTIDO_TENHO = '+JSON.stringify(atual)+';');
  const blob=new Blob(['<!DOCTYPE html>\n'+html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='figurinhas_copa2026_atualizado.html';
  a.click();
  mostrarToast('⬇️ Arquivo salvo!','ok');
}

function mostrarTexto(txt){
  const caixa=document.getElementById('caixaLista');
  caixa.style.display='block';
  document.getElementById('listaTexto').value=txt;
  document.getElementById('listaTexto').select();
  caixa.scrollIntoView({behavior:'smooth',block:'start'});
}

let toastTimer;
function mostrarToast(msg,tipo='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast toast-'+tipo+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.classList.remove('show')},2800);
}

/* ══ INIT ══ */
document.getElementById('busca').addEventListener('input',desenhar);
document.getElementById('filtro').addEventListener('change',desenhar);
desenhar();
montarOpcoesLista();
</script>
</body>
</html>
