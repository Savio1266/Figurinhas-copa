<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Figurinhas Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --verde:   #00c853;
  --verde2:  #00e676;
  --ouro:    #ffd600;
  --ouro2:   #ffab00;
  --azul:    #0d1b2a;
  --azul2:   #162536;
  --azul3:   #1e3a5f;
  --azul4:   #2451a0;
  --branco:  #f5f7fa;
  --cinza:   #8fa3b8;
  --cinza2:  #c8d8e8;
  --falta-bg:    #1a0a0a;
  --falta-cor:   #ff6b6b;
  --falta-borda: #7a1f1f;
  --tenho-bg:    #071a12;
  --tenho-cor:   #00e676;
  --tenho-borda: #0a5c2e;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --font-display: 'Bebas Neue', sans-serif;
  --font-cond:    'Barlow Condensed', sans-serif;
  --font-body:    'Barlow', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--azul);
  color: var(--branco);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, #0b2447 0%, #0d1b2a 60%, #162536 100%);
  border-bottom: 3px solid var(--ouro);
  box-shadow: 0 4px 30px rgba(0,0,0,0.7);
  padding: 14px 18px 12px;
}

.header-top {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap;
}

.logo-area {
  display: flex; align-items: center; gap: 12px;
}

.trophy {
  font-size: 42px; line-height: 1;
  filter: drop-shadow(0 0 12px rgba(255,214,0,0.6));
  animation: pulse-glow 3s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(255,214,0,0.4)); }
  50%       { filter: drop-shadow(0 0 20px rgba(255,214,0,0.9)); }
}

.titulo-bloco h1 {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 2px;
  line-height: 1;
  background: linear-gradient(90deg, var(--ouro), var(--verde2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.titulo-bloco p {
  font-family: var(--font-cond);
  font-size: 13px;
  color: var(--cinza);
  letter-spacing: 1px;
  margin-top: 3px;
}

/* ── BARRA DE AÇÕES ── */
.topbar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center;
}

.search-wrap {
  position: relative; flex: 1; min-width: 200px;
}

.search-wrap svg {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  color: var(--cinza); width: 16px; height: 16px;
}

#busca {
  width: 100%; padding: 10px 14px 10px 40px;
  background: var(--azul2); border: 1.5px solid var(--azul3);
  border-radius: 10px; color: var(--branco);
  font-family: var(--font-body); font-size: 14px;
  transition: border-color .2s, box-shadow .2s;
}
#busca:focus { outline: none; border-color: var(--ouro); box-shadow: 0 0 0 3px rgba(255,214,0,.15); }
#busca::placeholder { color: var(--cinza); }

#filtro {
  padding: 10px 14px;
  background: var(--azul2); border: 1.5px solid var(--azul3);
  border-radius: 10px; color: var(--branco);
  font-family: var(--font-body); font-size: 14px;
  cursor: pointer;
}
#filtro:focus { outline: none; border-color: var(--ouro); }
#filtro option { background: var(--azul2); }

/* Botões do header */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 15px; border-radius: 10px; border: none;
  font-family: var(--font-cond); font-size: 14px; font-weight: 600;
  letter-spacing: .5px; cursor: pointer;
  transition: transform .15s, box-shadow .15s, filter .15s;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn:active { transform: translateY(0); }

.btn-ouro  { background: linear-gradient(135deg, var(--ouro2), var(--ouro)); color: #1a1000; }
.btn-verde { background: linear-gradient(135deg, #009e42, var(--verde)); color: #001a0a; }
.btn-ghost { background: var(--azul2); border: 1.5px solid var(--azul3); color: var(--cinza2); }
.btn-ghost:hover { border-color: var(--cinza); }
.btn-perigo { background: #3b0f0f; border: 1.5px solid #7a1f1f; color: #ff9999; }

/* ── STATS ── */
main { max-width: 1060px; margin: auto; padding: 18px 14px 100px; position: relative; z-index: 1; }

.stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px;
}

.stat {
  background: linear-gradient(135deg, var(--azul2) 0%, var(--azul3) 100%);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
  transition: transform .2s;
}
.stat:hover { transform: translateY(-3px); }
.stat::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
}
.stat:nth-child(1)::after { background: var(--verde); }
.stat:nth-child(2)::after { background: var(--falta-cor); }
.stat:nth-child(3)::after { background: var(--ouro); }
.stat:nth-child(4)::after { background: linear-gradient(90deg, var(--verde), var(--ouro)); }

.stat-label {
  font-family: var(--font-cond);
  font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--cinza); margin-bottom: 6px;
}
.stat-valor {
  font-family: var(--font-display);
  font-size: 40px; line-height: 1;
}
.stat:nth-child(1) .stat-valor { color: var(--verde2); }
.stat:nth-child(2) .stat-valor { color: var(--falta-cor); }
.stat:nth-child(3) .stat-valor { color: var(--ouro); }
.stat:nth-child(4) .stat-valor { color: var(--branco); font-size: 32px; }

/* Progress bar */
.progresso-wrap {
  background: var(--azul2); border-radius: var(--radius);
  padding: 14px 18px; margin-bottom: 18px;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: var(--shadow);
}
.prog-labels {
  display: flex; justify-content: space-between;
  font-family: var(--font-cond); font-size: 12px;
  color: var(--cinza); letter-spacing: 1px; margin-bottom: 8px;
}
.prog-bar-outer {
  background: var(--azul); border-radius: 99px;
  height: 10px; overflow: hidden;
}
.prog-bar-inner {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, #009e42, var(--verde2), var(--ouro));
  transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 12px rgba(0,200,83,.4);
}

/* ── PAINEL LISTA ── */
.painel-lista {
  background: var(--azul2);
  border: 1.5px solid var(--azul3);
  border-radius: var(--radius);
  padding: 18px; margin-bottom: 18px;
  box-shadow: var(--shadow);
  animation: slideDown .2s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.painel-lista h3 {
  font-family: var(--font-cond);
  font-size: 16px; font-weight: 700;
  letter-spacing: 1px; color: var(--ouro);
  margin-bottom: 12px;
}

.acoes-painel { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

.checkgrid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 6px; max-height: 280px; overflow-y: auto; padding: 4px;
}
.checkgrid::-webkit-scrollbar { width: 6px; }
.checkgrid::-webkit-scrollbar-track { background: var(--azul); border-radius: 3px; }
.checkgrid::-webkit-scrollbar-thumb { background: var(--azul3); border-radius: 3px; }

.checkitem {
  display: flex; align-items: center; gap: 8px;
  background: var(--azul); border: 1px solid var(--azul3);
  border-radius: 8px; padding: 8px 10px;
  font-size: 13px; cursor: pointer;
  transition: background .15s, border-color .15s;
}
.checkitem:hover { background: var(--azul3); border-color: var(--ouro); }
.checkitem input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--ouro);
  flex-shrink: 0; cursor: pointer;
}
.checkitem .ci-nome { flex: 1; color: var(--branco); }
.checkitem .ci-badge {
  font-family: var(--font-cond);
  font-size: 11px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  background: var(--falta-bg); color: var(--falta-cor);
  border: 1px solid var(--falta-borda);
}
.checkitem .ci-badge.ok { background: var(--tenho-bg); color: var(--tenho-cor); border-color: var(--tenho-borda); }

.box-lista {
  background: var(--azul); border: 1px solid var(--azul3);
  border-radius: var(--radius); padding: 16px; margin-top: 14px;
  animation: slideDown .2s ease;
}
.box-lista h4 {
  font-family: var(--font-cond); font-size: 15px;
  font-weight: 700; color: var(--ouro); margin-bottom: 10px;
}
.box-lista textarea {
  width: 100%; min-height: 200px;
  background: #060d14; border: 1px solid var(--azul3);
  border-radius: 8px; padding: 12px;
  color: var(--verde2); font-family: monospace; font-size: 12.5px;
  resize: vertical;
}

/* ── SECAO HEADING ── */
.secao-heading {
  display: flex; align-items: center; gap: 12px;
  margin: 28px 0 12px;
}
.secao-heading span {
  font-family: var(--font-display);
  font-size: 22px; letter-spacing: 2px;
  color: var(--ouro);
}
.secao-linha {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--ouro2), transparent);
}

/* ── CARD SELEÇÃO ── */
.card {
  background: linear-gradient(135deg, var(--azul2) 0%, #132035 100%);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius); margin-bottom: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  overflow: hidden;
  transition: box-shadow .2s, border-color .2s;
}
.card:hover { border-color: rgba(255,214,0,0.2); box-shadow: 0 4px 24px rgba(0,0,0,0.6); }

.card-summary {
  list-style: none; display: flex;
  align-items: center; justify-content: space-between;
  padding: 14px 18px; cursor: pointer; gap: 10px;
  transition: background .15s;
}
.card-summary::-webkit-details-marker { display: none; }
.card-summary:hover { background: rgba(255,255,255,0.03); }

details[open] .card-summary {
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
details[open] .card-summary .chevron { transform: rotate(180deg); }
.chevron {
  width: 18px; height: 18px; color: var(--cinza);
  transition: transform .25s; flex-shrink: 0;
}

.card-nome {
  font-family: var(--font-cond);
  font-size: 18px; font-weight: 700;
  letter-spacing: .5px; flex: 1;
}
.card-codigo {
  font-family: var(--font-cond);
  font-size: 12px; font-weight: 600;
  padding: 3px 10px; border-radius: 99px;
  background: rgba(36,81,160,0.4);
  border: 1px solid var(--azul4);
  color: #7eb3ff; letter-spacing: 1px;
  margin-left: 8px;
}

.card-stats { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.pill {
  font-family: var(--font-cond); font-size: 13px; font-weight: 700;
  padding: 4px 12px; border-radius: 99px;
}
.pill-tenho { background: var(--tenho-bg); color: var(--tenho-cor); border: 1px solid var(--tenho-borda); }
.pill-falta { background: var(--falta-bg); color: var(--falta-cor); border: 1px solid var(--falta-borda); }
.pill-completo { background: linear-gradient(90deg, #071a12, #0b3020); color: var(--verde2); border: 1px solid #0a5c2e; }

/* Mini progress dentro do card */
.mini-prog {
  width: 80px; height: 5px; background: var(--azul); border-radius: 99px; overflow: hidden;
}
.mini-prog-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--verde), var(--ouro));
}

/* ── CONTEÚDO CARD ── */
.card-body { padding: 16px 18px; }

.faltantes-linha {
  font-size: 13px; color: var(--cinza); margin-bottom: 14px; line-height: 1.6;
}
.faltantes-linha strong { color: var(--falta-cor); font-family: var(--font-cond); font-size: 14px; }
.faltantes-codigos { color: #ffb3b3; font-weight: 600; }

/* Grid de figurinhas */
.figs { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }

.fig {
  min-width: 54px; padding: 8px 6px;
  border-radius: 9px; border: 1.5px solid;
  font-family: var(--font-cond); font-size: 13px; font-weight: 700;
  cursor: pointer; text-align: center;
  transition: transform .12s, box-shadow .12s, filter .12s;
  letter-spacing: .3px;
}
.fig:hover { transform: scale(1.1); z-index: 2; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.fig:active { transform: scale(0.97); }

.fig.falta {
  background: var(--falta-bg);
  color: var(--falta-cor);
  border-color: var(--falta-borda);
}
.fig.falta:hover { background: #2a1010; border-color: var(--falta-cor); filter: brightness(1.2); }

.fig.tenho {
  background: var(--tenho-bg);
  color: var(--tenho-cor);
  border-color: var(--tenho-borda);
}
.fig.tenho:hover { background: #0a2e1a; border-color: var(--tenho-cor); filter: brightness(1.2); }

/* Ações do card */
.card-acoes { display: flex; gap: 8px; flex-wrap: wrap; }

.btn-sm {
  padding: 7px 13px; border-radius: 8px; border: none;
  font-family: var(--font-cond); font-size: 13px; font-weight: 600;
  cursor: pointer; letter-spacing: .3px;
  transition: transform .12s, filter .12s;
}
.btn-sm:hover { transform: translateY(-1px); filter: brightness(1.15); }
.btn-sm.marcar-tenho  { background: var(--tenho-bg); color: var(--tenho-cor); border: 1px solid var(--tenho-borda); }
.btn-sm.marcar-falta  { background: var(--falta-bg); color: var(--falta-cor); border: 1px solid var(--falta-borda); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--azul3); border: 1px solid var(--ouro);
  color: var(--branco); font-family: var(--font-cond); font-size: 15px; font-weight: 600;
  padding: 12px 24px; border-radius: 12px; z-index: 9999;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  opacity: 0; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── SEM RESULTADO ── */
.sem-resultado {
  text-align: center; padding: 60px 20px;
  font-family: var(--font-cond); font-size: 20px; color: var(--cinza);
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .titulo-bloco h1 { font-size: 22px; }
  .trophy { font-size: 34px; }
  .card-stats .mini-prog { display: none; }
  .btn { padding: 8px 11px; font-size: 13px; }
  .stat-valor { font-size: 32px; }
}
@media (max-width: 400px) {
  .card-stats { gap: 6px; }
  .pill { font-size: 12px; padding: 3px 8px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="logo-area">
      <div class="trophy">🏆</div>
      <div class="titulo-bloco">
        <h1>FIGURINHAS COPA 2026</h1>
        <p>CONTROLE PESSOAL · FAMÍLIA · OFFLINE</p>
      </div>
    </div>
  </div>

  <div class="topbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="busca" type="search" placeholder="Buscar seleção, código ou figurinha…">
    </div>

    <select id="filtro">
      <option value="todas">Mostrar tudo</option>
      <option value="faltando">Só com faltantes</option>
      <option value="completas">Só completas</option>
    </select>

    <button class="btn btn-ouro" onclick="abrirPainelLista()">📋 Lista filtrada</button>
    <button class="btn btn-verde" onclick="gerarLista()">📄 Lista geral</button>
    <button class="btn btn-ghost" onclick="exportar()">💾 Exportar</button>
    <button class="btn btn-ghost" onclick="importar()">📥 Importar</button>
    <button class="btn btn-ghost" onclick="baixarCopia()">⬇️ Baixar cópia</button>
    <button class="btn btn-perigo" onclick="resetar()">↺ Restaurar</button>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-label">✅ Tenho</div><div class="stat-valor" id="tenhoTotal">0</div></div>
    <div class="stat"><div class="stat-label">❌ Faltam</div><div class="stat-valor" id="faltaTotal">0</div></div>
    <div class="stat"><div class="stat-label">📦 Total</div><div class="stat-valor" id="totalGeral">0</div></div>
    <div class="stat"><div class="stat-label">📈 Progresso</div><div class="stat-valor" id="percentual">0%</div></div>
  </div>

  <!-- BARRA DE PROGRESSO -->
  <div class="progresso-wrap">
    <div class="prog-labels">
      <span>PROGRESSO DO ÁLBUM</span>
      <span id="progLabel">0 de 0 figurinhas</span>
    </div>
    <div class="prog-bar-outer">
      <div class="prog-bar-inner" id="progBar" style="width:0%"></div>
    </div>
  </div>

  <!-- PAINEL LISTA FILTRADA -->
  <div id="painelLista" class="painel-lista" style="display:none">
    <h3>🎯 GERAR LISTA DE FALTANTES POR SELEÇÃO</h3>
    <div class="acoes-painel">
      <button class="btn btn-ghost" onclick="marcarTodosLista(true)">✔ Selecionar todas</button>
      <button class="btn btn-ghost" onclick="marcarTodosLista(false)">✕ Limpar seleção</button>
      <button class="btn btn-ouro"  onclick="selecionarSoComFaltantes()">🎯 Só com faltantes</button>
      <button class="btn btn-verde" onclick="gerarListaSelecionada()">📝 Gerar lista</button>
    </div>
    <div id="opcoesLista" class="checkgrid"></div>
    <div id="caixaLista" class="box-lista" style="display:none">
      <h4>📋 LISTA GERADA — copie e compartilhe!</h4>
      <textarea id="listaTexto" readonly></textarea>
    </div>
  </div>

  <!-- APP -->
  <div id="app"></div>
</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

    estado = estadoInicial(); salvar(); desenhar(); montarOpcoesLista();
    mostrarToast("↺ Progresso restaurado para o estado inicial.");
  }
}

/* ── RENDER ── */
function desenhar() {
  const app = document.getElementById("app");
  const busca = document.getElementById("busca").value.toLowerCase().trim();
  const filtro = document.getElementById("filtro").value;
  let html = "", total = 0, tenhoT = 0, secaoAtual = "";

  ALBUM.forEach(g => { total += g.itens.length; tenhoT += obtidos(g).length; });
  const faltaT = total - tenhoT;
  const pct = total ? Math.round((tenhoT / total) * 100) : 0;

  document.getElementById("tenhoTotal").textContent = tenhoT;
  document.getElementById("faltaTotal").textContent = faltaT;
  document.getElementById("totalGeral").textContent = total;
  document.getElementById("percentual").textContent = pct + "%";
  document.getElementById("progBar").style.width = pct + "%";
  document.getElementById("progLabel").textContent = `${tenhoT} de ${total} figurinhas`;

  ALBUM.forEach((g, idx) => {
    const t = obtidos(g), f = faltantes(g);
    const texto = (g.secao + " " + g.nome + " " + g.codigo + " " + g.itens.join(" ")).toLowerCase();
    if (busca && !texto.includes(busca)) return;
    if (filtro === "faltando" && f.length === 0) return;
    if (filtro === "completas" && f.length > 0) return;

    if (g.secao !== secaoAtual) {
      secaoAtual = g.secao;
      html += `<div class="secao-heading"><span>${secaoAtual.toUpperCase()}</span><div class="secao-linha"></div></div>`;
    }

    const pctG = g.itens.length ? Math.round((t.length / g.itens.length) * 100) : 0;
    const pillFalta = f.length === 0
      ? `<span class="pill pill-completo">🏅 COMPLETO</span>`
      : `<span class="pill pill-falta">❌ ${f.length} faltam</span>`;
    const pillTenho = `<span class="pill pill-tenho">✅ ${t.length}</span>`;

    const figsHtml = g.itens.map(item =>
      `<button class="fig ${tenho(item) ? 'tenho' : 'falta'}" onclick="alternar('${item}')" title="${tenho(item) ? 'Tenho — clique para desmarcar' : 'Falta — clique para marcar'}">${item}</button>`
    ).join("");

    const faltantesTexto = f.length
      ? `<strong>${f.length} faltam:</strong> <span class="faltantes-codigos">${f.join(", ")}</span>`
      : `<strong style="color:var(--verde2)">🏅 Seleção completa!</strong>`;

    html += `
<details>
  <summary class="card-summary">
    <div style="display:flex;align-items:center;flex:1;gap:4px;min-width:0">
      <span class="card-nome">${g.nome}</span>
      <span class="card-codigo">${g.codigo}</span>
    </div>
    <div class="card-stats">
      ${pillTenho}
      ${pillFalta}
      <div class="mini-prog"><div class="mini-prog-fill" style="width:${pctG}%"></div></div>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
    </div>
  </summary>
  <div class="card-body">
    <div class="faltantes-linha">${faltantesTexto}</div>
    <div class="figs">${figsHtml}</div>
    <div class="card-acoes">
      <button class="btn-sm marcar-tenho" onclick="marcarGrupo(${idx}, true)">✅ Marcar tudo como TENHO</button>
      <button class="btn-sm marcar-falta" onclick="marcarGrupo(${idx}, false)">❌ Marcar tudo como FALTA</button>
    </div>
  </div>
</details>`;
  });

  app.innerHTML = html || `<div class="sem-resultado">🔍 Nenhum resultado encontrado para essa busca.</div>`;
}

/* ── PAINEL LISTA FILTRADA ── */
function abrirPainelLista() {
  const painel = document.getElementById("painelLista");
  const visivel = painel.style.display !== "none";
  painel.style.display = visivel ? "none" : "block";
  if (!visivel) { montarOpcoesLista(); painel.scrollIntoView({ behavior: "smooth", block: "start" }); }
}

function montarOpcoesLista() {
  const div = document.getElementById("opcoesLista");
  div.innerHTML = ALBUM.map((g, idx) => {
    const f = faltantes(g);
    const badgeCls = f.length === 0 ? "ok" : "";
    const badgeText = f.length === 0 ? "✓ completo" : `${f.length} faltam`;
    return `<label class="checkitem">
      <input type="checkbox" class="chkLista" value="${idx}">
      <span class="ci-nome">${g.nome} <small style="color:var(--cinza)">(${g.codigo})</small></span>
      <span class="ci-badge ${badgeCls}">${badgeText}</span>
    </label>`;
  }).join("");
}

function marcarTodosLista(valor) { document.querySelectorAll(".chkLista").forEach(c => c.checked = valor); }
function selecionarSoComFaltantes() { document.querySelectorAll(".chkLista").forEach(c => c.checked = faltantes(ALBUM[Number(c.value)]).length > 0); }

function gerarListaSelecionada() {
  const marcados = [...document.querySelectorAll(".chkLista:checked")].map(c => Number(c.value));
  if (!marcados.length) { mostrarToast("⚠️ Escolha pelo menos uma seleção."); return; }
  let saida = [], secao = "";
  marcados.forEach(idx => {
    const g = ALBUM[idx], f = faltantes(g);
    if (!f.length) return;
    if (g.secao !== secao) { secao = g.secao; saida.push("\n# " + secao); }
    saida.push(`${g.nome} (${g.codigo}): ${f.join(", ")}`);
  });
  mostrarTexto(saida.join("\n").trim() || "✅ As seleções escolhidas estão completas!");
}

function gerarLista() {
  let saida = [], secao = "";
  ALBUM.forEach(g => {
    const f = faltantes(g);
    if (!f.length) return;
    if (g.secao !== secao) { secao = g.secao; saida.push("\n# " + secao); }
    saida.push(`${g.nome} (${g.codigo}): ${f.join(", ")}`);
  });
  const painel = document.getElementById("painelLista");
  painel.style.display = "block";
  mostrarTexto(saida.join("\n").trim() || "✅ Álbum completo! Parabéns!");
  painel.scrollIntoView({ behavior: "smooth" });
}

/* ── EXPORT / IMPORT / BAIXAR ── */
function exportar() {
  const tenhoAtual = Object.keys(estado).filter(k => estado[k]).sort();
  mostrarTexto(tenhoAtual.join(","));
  const painel = document.getElementById("painelLista");
  painel.style.display = "block";
  painel.scrollIntoView({ behavior: "smooth" });
  mostrarToast("💾 Copie o texto e envie para a família!");
}

function importar() {
  const txt = prompt("Cole aqui o progresso exportado (lista de figurinhas separadas por vírgula):");
  if (!txt) return;
  const lista = txt.split(",").map(x => x.trim()).filter(Boolean);
  ALBUM.forEach(g => g.itens.forEach(item => estado[item] = lista.includes(item)));
  salvar(); desenhar(); montarOpcoesLista();
  mostrarToast("📥 Progresso importado com sucesso!");
}

function baixarCopia() {
  const atual = Object.keys(estado).filter(k => estado[k]).sort();
  let html = document.documentElement.outerHTML;
  html = html.replace(
    /const EMBUTIDO_TENHO = \[[\s\S]*?\];/,
    "const EMBUTIDO_TENHO = " + JSON.stringify(atual) + ";"
  );
  const blob = new Blob(["<!DOCTYPE html>\n" + html], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "controle_figurinhas_copa2026_atualizado.html";
  a.click();
  mostrarToast("⬇️ Arquivo salvo! Compartilhe com a família.");
}

/* ── UTILITÁRIOS ── */
function mostrarTexto(txt) {
  const caixa = document.getElementById("caixaLista");
  caixa.style.display = "block";
  document.getElementById("listaTexto").value = txt;
  document.getElementById("listaTexto").select();
  caixa.scrollIntoView({ behavior: "smooth", block: "start" });
}

let toastTimer;
function mostrarToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

/* ── INIT ── */
document.getElementById("busca").addEventListener("input", desenhar);
document.getElementById("filtro").addEventListener("change", desenhar);
desenhar();
montarOpcoesLista();
</script>
